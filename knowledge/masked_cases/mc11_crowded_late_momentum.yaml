# Маскированный кейс §23.2(б). Класс: товар, перегретый тренд. ЛОВУШКА тайминга: ПОЗДНО/толпа.
id: mc11_crowded_late_momentum
класс_актива: "сырьевой товар (перегретый восходящий тренд)"

подаётся_агентам:
  нейтральный_тикер: "MASK_TREND"
  ситуация: |
    Товар Q за последние месяцы совершил мощный, широко освещённый рост на реальном, но уже полностью
    публичном фундаментальном драйвере. Деловые СМИ выпустили серию материалов «структурный бычий
    суперцикл Q». Спекулятивное позиционирование по отчёту биржи — у исторических экстремумов чистого
    лонга. Котировка Q обновила многолетний максимум, но последние сессии импульс роста затухает:
    новые максимумы сопровождаются падающим объёмом (медвежья дивергенция), волатильность повышена.
    Спрос со стороны конечных потребителей начал реагировать разрушением (субституция, сокращение).
    Форвардная кривая в глубокой бэквордации — будущее предложение ожидается дешевле.
  числа_маскированы:
    - "СКРЫТЫ идентичности: товар Q, драйвер, год"
    - "величины — НЕЙТРАЛЬНЫЕ синтетические ориентиры ниже; направление НЕ дано — выводит контур"
  нейтральные_количественные_ориентиры:
    величина_уже_состоявшегося_роста: "+большой многомесячный ход, цена у многолетнего максимума"
    спекулятивное_позиционирование: "чистый лонг у исторических экстремумов (≈98-й перцентиль)"
    дивергенция_объёма: "новые максимумы при падающем объёме (медвежья)"
    реакция_спроса: "началось разрушение спроса (субституция/сокращение)"
    форвардная_кривая: "глубокая бэквордация (будущее предложение дешевле)"
    отыграно_к_текущему_моменту: "драйвер ПОЛНОСТЬЮ публичен и в цене (≈отыграно на 90–100%)"
    carry_встречный_ветер_шорта: "глубокая бэквордация → ШОРТ платит ОТРИЦАТЕЛЬНЫЙ ролл-carry (кривая
      катится вверх к споту): удержание короткой позиции дорого, время работает ПРОТИВ шорта"
    издержки_шорта_неизвестны: "стоимость заёмки/финансирования короткой позиции НЕ задана (нет
      данных, П8) → безопасный размер шорта не определить, истинная net-асимметрия ЗАНИЖЕНА"
    устойчивость_импульса: "переполненный лонг и ценовой экстремум исторически держатся недели-месяцы;
      точная вершина и срок разворота неизвестны → ВХОД В ШОРТ по таймингу слабый (ловля падающего ножа)"
    катализатор_разворота: "конкретный катализатор/срок слома тренда ОТСУТСТВУЕТ в поданных данных"
  источники_среза:
    - источник: "отчёт биржи о позиционировании (COT-аналог)"
      факт: "чистый спекулятивный лонг у исторических экстремумов"
      независимость: "биржевой первичный"
    - источник: "ценовой/объёмный ряд биржи-ориентира"
      факт: "новые максимумы при падающем объёме (дивергенция), повышенная волатильность"
      независимость: "биржевой первичный"
    - источник: "отраслевые данные о потреблении (статагентство)"
      факт: "признаки разрушения спроса — субституция и сокращение"
      независимость: "независимый отраслевой"
  индикаторы:
    last_close: 100.0
    atr14: 3.6
    ret_z_20: 3.2        # ЭКСТРЕМАЛЬНЫЙ уже состоявшийся ход → ПОЗДНО
    vol_z_20: -0.9       # объём на росте падает → угасание импульса
  издержки:
    round_trip_bps: 9
    short_borrow_fee_bps: null
    adv_usd_median: 700000000

эталон_АУДИТ:
  expected_stance: "reject"   # ЛОВУШКА тайминга: лонг здесь = погоня за толпой. РАЗБИТА/ВЕТО или отказ «нет»
  оригинал_подсказка: "родовой паттерн перегретого сырьевого суперцикла на поздней стадии"
  ожидаемое_направление: "НЕ лонг (поздно/толпа); лонг на хайпе — ошибка тайминга. Максимум — осторожный контр-тезис"
  каскад:
    - "1-й порядок: реальный драйвер — но уже ПОЛНОСТЬЮ публичен и в цене"
    - "ловушка: позиционирование у экстремума + дивергенция объёма + разрушение спроса = асимметрия вниз"
    - "правильный вывод: окно ЗАКРЫТО для лонга; погоня = ПОЗДНО/ЛОВУШКА"
  кто_продаёт: "умные деньги фиксируют лонг в толпу поздних покупателей; нам «продают» хайп СМИ"
  что_должно_быть_неизвестно:
    - "точная вершина и срок разворота"
  сигналы_хорошего_рассуждения:
    - "ловит ПОЗДНО: ret_z экстремальный, драйвер в цене, позиционирование у экстремума"
    - "видит медвежью дивергенцию объёма и разрушение спроса как риск вниз"
    - "честно НЕ входит в лонг (П8: «нет идеи»/стоп — допустимо); не гонится за толпой"
    - "если рассматривает ШОРТ — учитывает отрицательный ролл-carry от бэквордации, неизвестную
       заёмку и слабый тайминг входа → net-асимметрия НЕ оправдывает направленную ставку (РАЗБИТА)"

несовершенство_маскировки: |
  Паттерн «перегретый поздний тренд» родовой: модель распознаёт КЛАСС ловушки (это и проверяется),
  но не конкретный эпизод. Ключевая проверка — НЕ сертифицировать лонг. Результат ориентировочный (§23.2).
