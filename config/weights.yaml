# config/weights.yaml — веса скоринга и голосов (MASTER_SPEC §7, §5.3, §10, П11)
# ВЕРСИОНИРУЕТСЯ. Менять ТОЛЬКО через /apply-weights (ежемесячно, правила §10):
#   N≥30 сопоставимых разрешённых исходов · шаг ≤ ±10% · значимость на out-of-sample.
# Состав критериев скоринга меняется ТОЛЬКО с явного согласия пользователя.

version: 1
created: "2026-06-11"
note: "Стартовая конфигурация. Меритократия голосов ВЫКЛЮЧЕНА — форвард-статистики ещё нет, равные веса честнее выдуманных (§5.3)."

# --- Веса скоринга идей (§7, утверждены пользователем §30 п.6: 22/22/18/14/14/10) ---
scoring:
  probability_success: 0.22   # калиброванная вероятность судьи (от base rate)
  asymmetry_net:       0.22   # матожидание после ВСЕХ издержек
  non_obviousness:     0.18   # насколько НЕ отыграно (включая вердикт тайминга)
  data_reliability:    0.14   # качество и credibility источников
  risk_controllability: 0.14  # хедж, ликвидность, стоп-сценарий, низкий манип-балл
  competence_proximity: 0.10  # §13, близость к кругу компетенции
  # сумма = 1.00

# --- Веса голосов агентов в консенсусе (§5.3 меритократия) ---
# На старте ВСЕ равны. По мере накопления форвард-статистики (§10) калибровщик
# поднимает вес доказавших точность по ДАННОМУ типу вопросов. Историки/циклист/агент
# примет НЕ имеют прямого пути в консенсус (§4, блок B) — только через состязательный контур.
voices:
  meritocracy_enabled: false   # включается по gate накопления форвард-статистики
  default_weight: 1.0
  quarantined: []              # агенты в карантине (вклад устойчиво отрицателен, §11.1) — журналируются, в консенсус не входят
  # Пример будущей записи: behavioral_economist: {commodity_macro: 1.4, single_stock: 1.0}

# --- Параметры синтеза Дирижёра (§5.5) ---
synthesis:
  extremize_independent: true      # экстремизация агрегированных НЕЗАВИСИМЫХ оценок
  correlation_haircut: true        # при высокой корреляции оценок — почти без экстремизации
  contradiction_lowers_confidence: true  # неразрешённое противоречие открыто понижает уверенность
