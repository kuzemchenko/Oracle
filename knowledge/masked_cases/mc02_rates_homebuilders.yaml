# Маскированный кейс §23.2(б). Класс: акции сектора. Каскад «ставка→ипотека→девелоперы».
id: mc02_rates_homebuilders
класс_актива: "акции (строительный сектор)"

подаётся_агентам:
  нейтральный_тикер: "MASK_HOMEBUILD"
  ситуация: |
    Центральный банк юрисдикции J на нескольких последовательных заседаниях повышал ключевую
    ставку суммарно на заметную величину и в коммюнике сигнализировал «выше дольше». Ставки по
    новым ипотечным кредитам в J обновили многолетний максимум; заявки на ипотеку по недельной
    статистике сокращаются несколько месяцев подряд. Акции публичных девелоперов жилья сектора S
    при этом держатся вблизи годовых максимумов: отчётности отражают сильные ПРОШЛЫЕ кварталы и
    рекордный бэклог заказов, законтрактованных при низких ставках. Аналитический консенсус по
    форвардной выручке сектора пока почти не пересмотрен.
  числа_маскированы:
    - "суммарный размер повышения ставки — нейтрализован («заметная величина»)"
    - "уровень ипотечной ставки и масштаб падения заявок — качественно"
    - "конкретные мультипликаторы девелоперов — скрыты"
  индикаторы:
    last_close: 100.0
    atr14: 2.4
    ret_z_20: 1.1       # сектор у максимумов → часть risk-on отыграна, но переноса ещё нет
    vol_z_20: 0.3
  издержки:
    round_trip_bps: 8
    short_borrow_fee_bps: 35     # шорт девелоперов — есть данные по borrow
    adv_usd_median: 250000000

эталон_АУДИТ:
  оригинал_подсказка: "родовой цикл ужесточения ДКП → лаговый удар по жилью/девелоперам"
  ожидаемое_направление: "шорт"
  каскад:
    - "1-й порядок: рост ключевой ставки (полностью публичен, отыгран в облигациях)"
    - "2-й порядок: рост ипотечной ставки → падение спроса на жильё (лаг недель-месяцев)"
    - "3-й порядок: исчерпание бэклога, заключённого при низких ставках → пересмотр форвардной выручки девелоперов"
    - "торгуемое звено: переоценка акций девелоперов S вниз по мере пересмотра консенсуса"
  кто_продаёт: "покупатели акций на сильной ПРОШЛОЙ отчётности и бэклоге, экстраполирующие историю в будущее"
  что_должно_быть_неизвестно:
    - "длина лага ставка→спрос→выручка в текущем цикле"
    - "глубина бэклога и доля контрактов с правом отказа"
  сигналы_хорошего_рассуждения:
    - "разделяет ПРОШЛУЮ силу отчётности и БУДУЩИЙ спад спроса (ключ к «кто продаёт»)"
    - "для шорта честно учитывает borrow=35бп и риск сквиза (асимметрия net)"
    - "тайминг: окно открыто, пока консенсус не пересмотрен; вход частями"

несовершенство_маскировки: |
  Сцепка «ужесточение ДКП → удар по девелоперам с лагом» — учебная; модель опознаёт КЛАСС.
  Конкретная юрисдикция J, цикл, числа нейтрализованы. Риск частичной утечки выше среднего —
  помечается; результат ориентировочный (§23.2).
