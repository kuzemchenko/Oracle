# Маскированный кейс §23.2(б). Класс: акции (оборонный сектор). Каскад «структурный рост закупок→бэклог→форвард-выручка».
id: mc10_defense_backlog
класс_актива: "акции (оборонно-промышленный сектор)"

подаётся_агентам:
  нейтральный_тикер: "MASK_DEFENSE"
  ситуация: |
    Группа юрисдикций блока B законодательно закрепила многолетнее повышение оборонных бюджетов и
    уже разместила первые крупные контракты у публичных подрядчиков сектора D. Объявленный бэклог
    заказов подрядчиков обновил многолетний максимум и законтрактован на годы вперёд. Производственные
    мощности — узкое место: расширение линий и наём идут с лагом. Акции сектора выросли с момента
    первых новостей, но форвардный консенсус по выручке и марже пересмотрен лишь частично: аналитики
    осторожны из-за исторической «лоскутности» исполнения оборонных бюджетов. Оценочные мультипликаторы
    сектора — около исторических средних, не в экстремуме.
  числа_маскированы:
    - "СКРЫТЫ идентичности: блок B, сектор D, эмитенты, год"
    - "величины — НЕЙТРАЛЬНЫЕ синтетические ориентиры ниже; направление НЕ дано — выводит контур"
  нейтральные_количественные_ориентиры:
    закреплённое_повышение_бюджетов: "+ многолетний план, первая волна контрактов уже размещена"
    бэклог_подрядчиков: "многолетний максимум, покрытие ≈3–5 лет выручки"
    лаг_расширения_мощностей: "4–8 кварталов (узкое место)"
    пересмотр_форвард_консенсуса_выручки: "частичный (<10%), аналитики осторожны"
    мультипликаторы_сектора: "около исторических средних (не экстремум)"
    историч_диапазон_переоценки_класса: "20–50% за 3–6 кв. при подтверждённой конверсии бэклога в выручку"
    отыграно_к_текущему_моменту: "сектор вырос на первой новости, но конверсия НЕ в цене"
    торгуемый_механизм_и_окно: "цена в ФОРВАРД-РЕ-РЕЙТИНГЕ мультипликаторов ПО МЕРЕ пересмотра консенсуса
      (катализаторы — поквартальные отчёты/гайденс/бэклог), который ОПЕРЕЖАЕТ полную выручку — НЕ нужно
      ждать конца лага мощностей; когерентный горизонт тезиса ≈3–6 кв. (окно ре-рейтинга)"
    характер_инвалидации: "ФУНДАМЕНТАЛЬНАЯ — отмена/срез контрактов, остановка пересмотра консенсуса,
      провал конверсии бэклога; ход МНОГОКВАРТАЛЬНЫЙ → тугой дневной ATR-стоп нерелевантен и ложно
      «гарантирует» выбивание (учитывай инвалидацию по уровню тезиса, а не по дневной волатильности)"
  источники_среза:
    - источник: "законодательные акты/бюджеты юрисдикций блока B (офиц.)"
      факт: "закреплённое многолетнее повышение оборонных расходов"
      независимость: "первичный официальный"
    - источник: "корпоративные пресс-релизы и квартальные отчёты подрядчиков D"
      факт: "бэклог на многолетнем максимуме, покрытие 3–5 лет"
      независимость: "первичная отчётность эмитентов"
    - источник: "консенсус-база форвард-оценок (агрегатор аналитиков)"
      факт: "форвард-выручка пересмотрена лишь частично (<10%)"
      независимость: "независимый агрегатор"
  индикаторы:
    last_close: 100.0
    atr14: 2.1
    ret_z_20: 1.3        # часть risk-on отыграна, но конверсия бэклога ещё нет
    vol_z_20: 0.6
  издержки:
    round_trip_bps: 7
    short_borrow_fee_bps: 25
    adv_usd_median: 500000000

эталон_АУДИТ:
  expected_stance: "affirm"   # реальный структурный каскад конверсии бэклога; audit-only
  оригинал_подсказка: "родовой эпизод структурного роста оборонных закупок → переоценка подрядчиков"
  ожидаемое_направление: "лонг оборонного сектора D"
  каскад:
    - "1-й порядок: новость о росте бюджетов (частично отыграна ралли сектора)"
    - "2-й порядок: конверсия бэклога в фактическую выручку/маржу через кварталы"
    - "торгуемое звено: переоценка форвард-мультипликаторов по мере пересмотра консенсуса"
  кто_продаёт: "те, кто помнит «лоскутность» исполнения бюджетов и не верит в конверсию бэклога в выручку"
  что_должно_быть_неизвестно:
    - "темп конверсии бэклога в выручку и реальная маржа исполнения"
    - "риск задержек из-за узкого места мощностей"
  сигналы_хорошего_рассуждения:
    - "ценность в КОНВЕРСИИ бэклога (дальнее звено), а не в самой новости о бюджете (1-й порядок)"
    - "мультипликаторы не в экстремуме + консенсус не пересмотрен → почему окно держится"
    - "разрешимость §9: уровень сектора/эмитента к дате после N отчётностей, источник — биржа"

несовершенство_маскировки: |
  Связка «рост оборонных бюджетов → переоценка подрядчиков» родовая: модель распознаёт КЛАСС, но не
  эпизод — блок/сектор/год скрыты. Результат ориентировочный (§23.2).
