# Маскированный кейс §23.2(б). Класс: макро-идея. ЛОВУШКА «отыграно»: каскад уже в цене/консенсусе/кривой.
id: mc13_consensus_priced_in
класс_актива: "макро-идея на ликвидном активе (ставки/валюта/индекс)"

подаётся_агентам:
  нейтральный_тикер: "MASK_MACRO"
  ситуация: |
    Реальный, корректный по механике макро-каскад на активе A широко обсуждается уже несколько
    кварталов: логика верна и подтверждена данными. НО — это давно «всеобщее знание»: каждый
    инвестбанк выпустил по нему ноту, тема №1 в обзорах, опросы управляющих показывают консенсус.
    Форвардная кривая/процентные свопы УЖЕ закладывают ожидаемый исход почти полностью; вменённая
    рынком траектория совпадает с консенсус-прогнозом. Позиционирование в направлении идеи —
    перегружено. Котировка A давно сместилась к уровню, отражающему ожидаемый сценарий. Свежего,
    неотыгранного звена в каскаде НЕТ; любой «сюрприз» теперь скорее в противоположную сторону.
  числа_маскированы:
    - "СКРЫТЫ идентичности: актив A, конкретный макро-драйвер, год"
    - "величины — НЕЙТРАЛЬНЫЕ синтетические ориентиры ниже; направление НЕ дано — выводит контур"
  нейтральные_количественные_ориентиры:
    сколько_исхода_в_цене_кривой: "≈90–100% ожидаемого сценария уже в форварде/свопах"
    охват_консенсуса: "тема №1; ноты всех крупных домов; опросы управляющих — единодушны"
    позиционирование: "перегружено в направлении идеи (у экстремума)"
    неотыгранное_звено_каскада: "отсутствует (всё дальнее уже в цене)"
    асимметрия_сюрприза: "теперь скорее в ПРОТИВОПОЛОЖНУЮ сторону (риск разворота консенсуса)"
    отыграно_к_текущему_моменту: "≈90–100% (идея «всеобщее знание»)"
  источники_среза:
    - источник: "форвардная кривая / своп-рынок актива A"
      факт: "вменённая траектория ≈ полностью отражает ожидаемый исход"
      независимость: "рыночный первичный (цены)"
    - источник: "агрегатор аналитических нот + опрос управляющих"
      факт: "консенсус единодушен, тема №1, позиционирование перегружено"
      независимость: "независимый агрегатор сентимента"
  индикаторы:
    last_close: 100.0
    atr14: 1.4
    ret_z_20: 1.9        # движение по теме уже во многом состоялось
    vol_z_20: -0.4       # импульс угасает
  издержки:
    round_trip_bps: 5
    short_borrow_fee_bps: 15
    adv_usd_median: 1500000000

эталон_АУДИТ:
  expected_stance: "reject"   # ЛОВУШКА «отыграно»: каскад верен, но в цене. НЕ сертифицировать. РАЗБИТА/ВЕТО/отказ «нет»
  оригинал_подсказка: "родовой паттерн правильной, но полностью отыгранной консенсус-идеи"
  ожидаемое_направление: "НЕ входить по направлению консенсуса (нет edge — всё в цене). Максимум — осторожный фейд/стоп"
  каскад:
    - "механика каскада ВЕРНА — но дальние звенья уже в форварде/свопах и в позиционировании"
    - "ловушка: входить по очевидной идее = покупать то, что уже оценено; апсайда нет, риск разворота консенсуса"
    - "правильный вывод: «почему возможность ещё существует?» — НЕ существует; edge отсутствует"
  кто_продаёт: "никто не «продаёт нам» по ошибке — цена уже справедлива; контрагент знает то же, что и мы"
  что_должно_быть_неизвестно:
    - "когда и как консенсус начнёт разворачиваться (но это уже не наша направленная идея)"
  сигналы_хорошего_рассуждения:
    - "ОТВЕЧАЕТ на §4-вопрос «почему ещё существует» — и честно признаёт, что НЕ существует (всё в цене)"
    - "различает «идея верна» и «идея торгуема»: верный, но отыгранный каскад — не edge"
    - "не сертифицирует направленную ставку; «нет идеи» — корректный исход (П8)"

несовершенство_маскировки: |
  Паттерн «верно, но отыграно» родовой: модель распознаёт КЛАСС (это и проверяется), но не эпизод.
  Ключевая проверка — НЕ сертифицировать отыгранную идею. Результат ориентировочный (§23.2).
