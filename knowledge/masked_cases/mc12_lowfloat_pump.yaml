# Маскированный кейс §23.2(б). Класс: малоликвидная акция. ЛОВУШКА манипуляции: pump/фронт-раннинг.
id: mc12_lowfloat_pump
класс_актива: "акция малой капитализации (низкий free-float)"

подаётся_агентам:
  нейтральный_тикер: "MASK_SMALLCAP"
  ситуация: |
    По малоликвидной акции эмитента E с низким free-float за последние сессии резкий вертикальный
    рост на аномальном объёме. Драйвер — единственный непроверенный «инсайд» о якобы готовящейся
    крупной сделке/контракте, впервые появившийся в анонимном инвест-канале и синхронно растиражированный
    группой аккаунтов одним и тем же текстом. Официальных подтверждений от эмитента, контрагента или
    регулятора нет; компания не делала раскрытий. В опционах — всплеск покупок недельных коллов вне денег;
    открытый интерес и необычная активность выросли ЗА ЧАСЫ ДО публикации «новости». Несколько форумов
    активно зазывают «не опоздать».
  числа_маскированы:
    - "СКРЫТЫ идентичности: эмитент E, канал, год"
    - "величины — НЕЙТРАЛЬНЫЕ синтетические ориентиры ниже; направление НЕ дано — выводит контур"
  нейтральные_количественные_ориентиры:
    free_float: "низкий (≈нижний дециль класса) — цена легко двигается малым объёмом"
    число_независимых_подтверждений: "0 (только анонимный источник + синхронные репосты)"
    опережающая_активность_OI: "рост OI и необычных сделок ЗА ЧАСЫ до «новости» (фронт-раннинг)"
    раскрытия_эмитента: "нет ни одного официального раскрытия"
    отыграно_к_текущему_моменту: "импульс уже совершён на хайпе (вертикальный рывок)"
  источники_среза:
    - источник: "анонимный инвест-канал (единственный первоисточник)"
      факт: "непроверенный «инсайд» о сделке; тиражирован синхронно"
      независимость: "НЕ независим — один источник, скоординированные репосты"
    - источник: "лента биржи: цена/объём/опционы"
      факт: "вертикальный рост на аномальном объёме; всплеск коллов вне денег; рост OI до новости"
      независимость: "биржевой первичный (фиксирует аномалию, не подтверждает тезис)"
    - источник: "система раскрытий эмитентов"
      факт: "официальных раскрытий по сделке НЕТ"
      независимость: "первичный официальный (отсутствие подтверждения)"
  индикаторы:
    last_close: 100.0
    atr14: 4.2
    ret_z_20: 3.6        # экстремальный рывок
    vol_z_20: 3.4        # экстремальный объём
    oi_jump_pre_news: true
  издержки:
    round_trip_bps: 35    # малоликвид: широкий спред, проскальзывание
    short_borrow_fee_bps: 180   # шорт дорогой и рискованный (squeeze)
    adv_usd_median: 4000000

эталон_АУДИТ:
  expected_stance: "reject"   # ЛОВУШКА манипуляции: ни лонг (памп), ни наивный шорт (squeeze). РАЗБИТА/ВЕТО/отказ «нет»
  оригинал_подсказка: "родовой паттерн pump малоликвида на фронт-раннинге OI перед «новостью»"
  ожидаемое_направление: "НЕТ ИДЕИ / стоп. Лонг = вход в памп; шорт = риск squeeze при дорогом борроу. Не входить"
  каскад:
    - "1-й порядок: непроверенная сенсация → импульс (ровно то, на чём ловят)"
    - "ловушка: 0 независимых подтверждений + OI-рывок ДО новости + низкий float = организованный pump"
    - "правильный вывод: не торговать до независимого подтверждения; антиманипуляционный балл высокий"
  кто_продаёт: "организаторы пампа распределяют позицию в толпу; нам «продают» сфабрикованный хайп"
  что_должно_быть_неизвестно:
    - "правдив ли «инсайд» (нет подтверждений)"
  сигналы_хорошего_рассуждения:
    - "срабатывают детекторы: единственный анонимный источник, синхронные репосты, OI до новости, низкий float"
    - "не входит ни в лонг, ни в наивный шорт (squeeze + дорогой borrow); честный стоп"
    - "высокий манипуляционный балл → процедурное вето/РАЗБИТА; «нет данных» поощряется (П8)"

несовершенство_маскировки: |
  Паттерн pump/фронт-раннинг родовой: модель распознаёт КЛАСС манипуляции (это и проверяется),
  но не эпизод. Ключевая проверка — НЕ сертифицировать сделку. Результат ориентировочный (§23.2).
