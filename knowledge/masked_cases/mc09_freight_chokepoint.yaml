# Маскированный кейс §23.2(б). Класс: фрахт/судоходство. Каскад «закрытие узкого места→рост тонно-миль→ставки».
id: mc09_freight_chokepoint
класс_актива: "фрахтовые ставки (танкеры/сухогрузы), биржевой индекс/прокси"

подаётся_агентам:
  нейтральный_тикер: "MASK_FREIGHT"
  ситуация: |
    Ключевой морской проход C, через который идёт значимая доля мировой торговли товарным классом
    G, частично закрыт: суда вынуждены идти кружным маршрутом, удлиняющим рейс. Закрытие
    подтверждено несколькими независимыми морскими диспетчерскими сервисами по данным AIS.
    Эффективное предложение тоннажа сжимается: тот же флот при удлинённых рейсах перевозит меньше
    груза в единицу времени (рост тонно-миль). Спотовые ставки фрахта на затронутых маршрутах
    начали расти, но участники спорят, временно ли закрытие. Загрузка верфей высокая — быстрый ввод
    нового тоннажа невозможен.
  числа_маскированы:
    - "СКРЫТЫ идентичности: проход C, класс груза G, маршруты, год"
    - "величины — НЕЙТРАЛЬНЫЕ синтетические ориентиры ниже; направление НЕ дано — выводит контур"
  нейтральные_количественные_ориентиры:
    доля_мировой_торговли_G_через_проход: "≈12–15%"
    удлинение_рейса_кружным_маршрутом: "+25–40% к длительности"
    эффект_на_эффективное_предложение_тоннажа: "−10–15% провозной способности на классе"
    лаг_ввода_нового_тоннажа: ">12 месяцев (верфи загружены)"
    типичный_лаг_закрытие_к_пику_ставок: "1–3 недели (библиотека предвестников)"
    историч_диапазон_реакции_ставок_класса: "40–120% за 2–8 недель при устойчивом закрытии"
    отыграно_к_текущему_моменту: "ставки на затронутых маршрутах ≈+10–15% (начало движения)"
    торгуемый_прокси_и_бета: "биржевой фрахтовый индекс/ETF класса (не спот напрямую): бета к спот-ставкам
      ≈0.7–1.0, исторически проходит ≈60–90% хода ставок класса, без встроенного плеча → net-асимметрия
      ВЫЧИСЛИМА из хода ставок × бета и round_trip_bps"
    окно_входа_открыто: "реализовано ≈10–15% из 40–120% хода; дефицит провозной способности держится
      МЕСЯЦАМИ (ввод нового тоннажа >12 мес.) → это ВОВРЕМЯ, не ПОЗДНО"
    характер_инвалидации: "ФУНДАМЕНТАЛЬНАЯ — проход быстро открывается ИЛИ спрос на перевозки G рушится
      (эластичность); тугой дневной ATR-стоп нерелевантен (ход недели-месяцы)"
  источники_среза:
    - источник: "морские диспетчерские сервисы по AIS (два независимых провайдера)"
      факт: "частичное закрытие прохода C подтверждено, суда идут кружным маршрутом"
      независимость: "два независимых трекинг-провайдера"
    - источник: "брокерская сводка спотовых ставок фрахта"
      факт: "ставки на затронутых маршрутах +10–15%, начало роста"
      независимость: "независимый брокерский"
    - источник: "отчёт по портфелю заказов верфей (отраслевой регистр)"
      факт: "верфи загружены, ввод нового тоннажа >12 мес."
      независимость: "независимый отраслевой регистр"
  индикаторы:
    last_close: 100.0
    atr14: 3.8
    ret_z_20: 0.8        # ставки только начали движение → окно открыто
    vol_z_20: 1.0
  издержки:
    round_trip_bps: 18    # фрахтовый прокси — издержки выше
    short_borrow_fee_bps: null
    adv_usd_median: 90000000

эталон_АУДИТ:
  expected_stance: "affirm"   # реальный каскад сжатия предложения тоннажа; audit-only
  оригинал_подсказка: "родовой эпизод закрытия морского узкого места → рост тонно-миль и ставок"
  ожидаемое_направление: "лонг фрахтовых ставок затронутого класса"
  каскад:
    - "1-й порядок: новость о закрытии (частично отыграна)"
    - "2-й порядок: рост тонно-миль сжимает эффективное предложение тоннажа через недели"
    - "торгуемое звено: рост спотовых/форвардных ставок фрахта класса"
  кто_продаёт: "те, кто ждёт быстрого открытия прохода и не пересчитал провозную способность флота"
  что_должно_быть_неизвестно:
    - "длительность закрытия прохода"
    - "эластичность спроса на перевозки G при росте ставок"
  сигналы_хорошего_рассуждения:
    - "механизм через ТОННО-МИЛИ и эффективное предложение, а не «закрытие=рост»"
    - "учитывает невозможность быстрого ввода тоннажа (почему окно держится)"
    - "разрешимость §9: уровень ставок/индекса к дате, источник — биржевой/брокерский фиксинг"

несовершенство_маскировки: |
  Связка «закрытие узкого места → рост фрахта» родовая: модель распознаёт КЛАСС, но не эпизод —
  проход/груз/год скрыты. Результат ориентировочный (§23.2).
