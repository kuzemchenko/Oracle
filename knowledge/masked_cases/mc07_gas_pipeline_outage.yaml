# Маскированный кейс §23.2(б). Класс: энергоноситель (газ). Каскад «перебой поставок→региональный дефицит→цена».
id: mc07_gas_pipeline_outage
класс_актива: "энергоноситель (природный газ, региональный хаб)"

подаётся_агентам:
  нейтральный_тикер: "MASK_GAS"
  ситуация: |
    В потребляющем регионе W на ключевой магистрали подачи природного газа зафиксирована
    внеплановая авария с подтверждённым выпадением заметной доли импортной мощности; оператор
    магистрали официально объявил ремонт неопределённого срока. Сезонный спрос на отопление в W
    входит в пик. Подземные хранилища газа в W идут ниже сезонной нормы и снижаются ускоренно.
    Альтернативные маршруты подачи и регазификационные терминалы работают у предела пропускной
    способности. Котировка регионального газового хаба совершила лишь сдержанную первую реакцию;
    форвардная кривая ближних месяцев пока в слабом контанго.
  числа_маскированы:
    - "СКРЫТЫ идентичности: регион W, магистраль, хаб, оператор, сезон/год"
    - "величины даны НЕЙТРАЛЬНЫМИ синтетическими ориентирами ниже; направление НЕ дано — выводит контур"
  нейтральные_количественные_ориентиры:
    выпавшая_доля_импортной_мощности: "≈15–20%"
    заполненность_хранилищ: "на ≈12 п.п. ниже сезонной нормы, темп отбора +30% к норме"
    загрузка_альтернативных_маршрутов_и_терминалов: "≈95–100% (резерва почти нет)"
    срок_ремонта_магистрали: "не определён (двусторонний риск, но базово недели)"
    типичный_лаг_перебой_к_пику_дефицита: "1–4 недели в отопительный пик (библиотека предвестников)"
    историч_диапазон_реакции_хаба_класса: "20–60% за 2–6 недель при подтверждённом дефиците в пик"
    отыграно_к_текущему_моменту: "ближний контракт ≈+3–5% (реакция сдержанная)"
  источники_среза:
    - источник: "официальное уведомление оператора магистрали"
      факт: "авария, выпадение ≈15–20% импортной мощности, срок ремонта не определён"
      независимость: "первичный официальный"
    - источник: "оператор подземных хранилищ (недельный отчёт)"
      факт: "заполненность на 12 п.п. ниже сезонной нормы, ускоренный отбор"
      независимость: "независим от магистрали"
    - источник: "диспетчерская сводка загрузки терминалов (независимый провайдер)"
      факт: "регаз-терминалы и альтернативные маршруты у предела пропускной способности"
      независимость: "независимый отраслевой"
  индикаторы:
    last_close: 100.0
    atr14: 3.1
    ret_z_20: 0.7        # реакция ещё сдержанная → окно скорее открыто
    vol_z_20: 1.2
  издержки:
    round_trip_bps: 11
    short_borrow_fee_bps: null
    adv_usd_median: 300000000

эталон_АУДИТ:
  expected_stance: "affirm"   # реальный каскад дефицита в пик спроса; audit-only
  оригинал_подсказка: "родовой эпизод перебоя газовой инфраструктуры в отопительный пик"
  ожидаемое_направление: "лонг регионального газового хаба"
  каскад:
    - "1-й порядок: новость об аварии (частично отыграна сдержанно)"
    - "2-й порядок: ускоренный отбор из хранилищ → подтверждённый дефицит баланса через недели"
    - "торгуемое звено: рост ближних/средних фьючерсов хаба по мере исчерпания буфера"
  кто_продаёт: "те, кто ждёт быстрого ремонта и видит спокойный спот без переноса на баланс хранилищ"
  что_должно_быть_неизвестно:
    - "точный срок ремонта магистрали"
    - "погодная траектория остатка отопительного сезона"
  сигналы_хорошего_рассуждения:
    - "строит баланс хранилища, а не «авария=рост»; учитывает буфер терминалов"
    - "тайминг РАНО/ВОВРЕМЯ: реакция сдержанная, окно открыто"
    - "разрешимость §9: уровень хаба к дате через N недель, источник — биржевая котировка"

несовершенство_маскировки: |
  Связка «перебой газовой инфраструктуры в пик → рост хаба» родовая: модель распознаёт КЛАСС
  причинности (это и проверяется), но не конкретный эпизод — регион/год/магистраль скрыты.
  Результат ориентировочный, не доказательный (§23.2).
