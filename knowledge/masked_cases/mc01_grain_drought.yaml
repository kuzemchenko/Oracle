# Маскированный кейс §23.2(б). Класс: сельхоз-товар. Каскад «погода→урожай→фьючерс».
id: mc01_grain_drought
класс_актива: "сельхоз-товар (зерно)"

# ── ЕДИНСТВЕННОЕ, что видят агенты (ни исхода, ни направления, ни оригинала) ──────
подаётся_агентам:
  нейтральный_тикер: "MASK_AGRI"
  ситуация: |
    Регион-экспортёр X обеспечивает порядка значительной доли мирового экспорта товарного
    зерна класса K. За последний агро-сезон в ключевых производящих провинциях X фиксируется
    погодная аномалия: дефицит осадков и температурный экстремум, по официальным замерам —
    редкой для региона выраженности. Национальная метеослужба X и два независимых
    спутниковых индекса вегетации подтверждают стресс посевов. Спотовая и ближняя фьючерсная
    котировка зерна K на бирже-ориентире пока без выраженной реакции; форвардная кривая в
    лёгком контанго. Сезон сбора по календарю наступит через несколько месяцев.
  числа_маскированы:
    - "СКРЫТЫ идентичности: страна X, год, название зерна K, биржа-ориентир"
    - "величины даны НЕЙТРАЛЬНЫМИ синтетическими ориентирами ниже (не привязаны к эпизоду) —"
    - "  чтобы проверять КАЧЕСТВО рассуждения по рубрике (§23.2б), а не угадывание эпизода"
  # Синтетические нейтральные величины (масштаб есть, идентичность скрыта). Направление НЕ дано —
  # его выводит контур. Источник — «поданный срез»; вне его данных нет (П8).
  нейтральные_количественные_ориентиры:
    доля_региона_в_мировом_экспорте: "≈25–30%"
    аномалия_осадков_от_нормы: "−40%"
    температурный_экстремум: "+2.3σ к 30-летней норме"
    переходящие_запасы_зерна_K: "нижняя треть 10-летнего диапазона"
    срок_до_старта_сбора: "≈12–14 недель"
    типичный_лаг_засуха_к_пересмотру_балансов: "4–8 недель (внутренняя библиотека предвестников)"
    историч_диапазон_реакции_ближнего_фьючерса_класса: "8–20% за 2–3 мес. при подтверждённом дефиците"
    отыграно_к_текущему_моменту: "спот/ближний фьючерс почти без реакции (≈0–3%)"
  # Атрибутируемые НЕЗАВИСИМЫЕ синтетические источники (можно цитировать; reviewer их проверяет).
  источники_среза:
    - источник: "нац. метеослужба региона X (офиц. бюллетень)"
      факт: "осадки −40% к 30-летней норме, температура +2.3σ"
      независимость: "первичный официальный"
    - источник: "спутниковый индекс вегетации NDVI-A (независимый провайдер)"
      факт: "стресс посевов в ключевых провинциях — высокий"
      независимость: "независим от метеослужбы"
    - источник: "спутниковый индекс влажности почвы SM-B (второй независимый провайдер)"
      факт: "влажность почвы в нижней децили 10-летнего ряда"
      независимость: "независим от первых двух"
    - источник: "отчёт биржи-ориентира о позиционировании (COT-аналог)"
      факт: "переходящие запасы зерна K в нижней трети 10-летнего диапазона; кривая в лёгком контанго"
      независимость: "биржевой первичный"
  индикаторы:           # синтетический срез для MASK_AGRI (нейтрализованные значения)
    last_close: 100.0
    atr14: 1.8
    ret_z_20: 0.4       # хода ещё почти нет → тайминг скорее РАНО
    vol_z_20: 0.6
  издержки:
    round_trip_bps: 12
    short_borrow_fee_bps: null
    adv_usd_median: 80000000

# ── ТОЛЬКО для человека/квартального аудита §25. Агентам НЕ передаётся. ────────────
эталон_АУДИТ:
  оригинал_подсказка: "родовой эпизод засухи у крупного экспортёра зерна (без привязки к стране/году)"
  expected_stance: "affirm"   # машиночитаемо для mathlib.masked_eval; агентам НЕ подаётся (audit-only)
  ожидаемое_направление: "лонг"
  каскад:
    - "1-й порядок: новость о засухе (часто уже частично отыграна локальными спекулянтами)"
    - "2-й порядок: официальный пересмотр прогноза урожая/экспортных балансов через лаг недель"
    - "3-й порядок: пересмотр мировых балансов, переток спроса к субститутам/другим экспортёрам"
    - "торгуемое звено: рост ближних/средних фьючерсов зерна K по мере подтверждения"
  кто_продаёт: "хеджеры-производители и трейдеры, видящие лишь спокойный спот без переноса на урожай"
  что_должно_быть_неизвестно:
    - "точный лаг переноса засуха→пересмотр балансов"
    - "эластичность спроса и реакция конкурирующих экспортёров"
  сигналы_хорошего_рассуждения:
    - "строит многоступенчатый каскад, а не «погода=рост»"
    - "тайминг РАНО/ВОВРЕМЯ: ход почти не отыгран — окно скорее открыто"
    - "разрешимость §9: уровень фьючерса K к дате после старта сбора, источник цены — биржа"

несовершенство_маскировки: |
  Связка «засуха у крупного экспортёра → рост зернового фьючерса» родовая: модель распознаёт
  КЛАСС причинности (это и проверяется — качество каскада), но не конкретный исторический эпизод —
  страна X, год, числа нейтрализованы. Результат ориентировочный, не доказательный (§23.2).
