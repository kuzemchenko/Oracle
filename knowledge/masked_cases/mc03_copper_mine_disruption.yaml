# Маскированный кейс §23.2(б). Класс: промышленный металл. Каскад «перебой добычи→баланс→цена».
id: mc03_copper_mine_disruption
класс_актива: "промышленный металл"

подаётся_агентам:
  нейтральный_тикер: "MASK_METAL"
  ситуация: |
    В стране-производителе Y, входящей в число крупнейших поставщиков промышленного металла M,
    объявлена остановка работы на одном из мировых по размеру рудников: трудовой конфликт с
    неопределённым сроком разрешения. Отдельно регулятор Y рассматривает ужесточение правил
    водопользования для горной отрасли. Биржевые склады по металлу M находятся на многолетних
    минимумах; кривая фьючерсов в бэквордации. Спотовая цена M отреагировала на новость умеренным
    скачком в день объявления, затем частично откатила. Премии физических поставок в Азии растут
    вторую неделю.
  числа_маскированы:
    - "СКРЫТЫ идентичности: страна Y, металл M, конкретный рудник, биржа"
    - "величины даны НЕЙТРАЛЬНЫМИ синтетическими ориентирами ниже (не привязаны к эпизоду) —"
    - "  для проверки КАЧЕСТВА рассуждения по рубрике (§23.2б). ВНИМАНИЕ к таймингу: см. «отыграно»"
  # Синтетические нейтральные величины. Направление НЕ дано — выводит контур. Только срез (П8).
  нейтральные_количественные_ориентиры:
    доля_страны_в_мировом_производстве_M: "≈9%"
    доля_рудника_в_мировой_добыче: "≈4–5%"
    биржевые_склады: "на 10-летних минимумах (≈10–12 дней мирового потребления)"
    скачок_в_день_новости_и_откат: "+импульс, затем откат вернул ≈половину → отыграно ≈50% первичного импульса"
    физические_премии_поставок: "+рост вторую неделю подряд"
    срок_забастовки: "неопределён (двусторонний риск: затяжной дефицит ИЛИ быстрое разрешение)"
    типичный_лаг_перебой_к_дефициту_склады: "2–6 недель (библиотека предвестников)"
    историч_диапазон_реакции_класса: "10–25% при подтверждённом устойчивом перебое за 1–3 мес."
  # Атрибутируемые НЕЗАВИСИМЫЕ синтетические источники (можно цитировать; reviewer их проверяет).
  источники_среза:
    - источник: "пресс-релиз оператора рудника (первичный)"
      факт: "остановка работ, срок разрешения трудового конфликта не определён"
      независимость: "первичный, заинтересованная сторона — учитывать смещение"
    - источник: "биржевые складские отчёты (LME-аналог)"
      факт: "запасы на 10-летних минимумах (≈10–12 дней потребления), кривая в бэквордации"
      независимость: "биржевой первичный"
    - источник: "сводка физических премий региона-потребителя (независимое ценовое агентство)"
      факт: "премии поставок растут вторую неделю подряд"
      независимость: "независимое ценовое агентство"
    - источник: "проект регулятора Y по водопользованию (офиц. публикация)"
      факт: "рассматривается ужесточение правил для горной отрасли"
      независимость: "первичный официальный (риск двусторонний)"
  индикаторы:
    last_close: 100.0
    atr14: 2.0
    ret_z_20: 1.7       # был резкий скачок в день новости → риск «ПОЗДНО/всплеск»
    vol_z_20: 2.2       # аномальный объём
  издержки:
    round_trip_bps: 10
    short_borrow_fee_bps: null
    adv_usd_median: 400000000

эталон_АУДИТ:
  оригинал_подсказка: "родовой эпизод перебоя поставок металла из-за забастовки на крупном руднике"
  expected_stance: "affirm"   # машиночитаемо для mathlib.masked_eval; агентам НЕ подаётся (audit-only)
  ожидаемое_направление: "лонг (осторожно — часть скачка отыграна)"
  каскад:
    - "1-й порядок: новость о забастовке → импульсный скачок цены (день объявления, частично отыгран)"
    - "2-й порядок: при затяжке — дренаж и так низких складских запасов, рост физических премий"
    - "3-й порядок: пересмотр годового баланса дефицита M → структурный сдвиг кривой"
    - "торгуемое звено: средние фьючерсы M вверх, если забастовка затягивается И запасы падают"
  кто_продаёт: "те, кто торгует разовый «новостной спайк» как отыгранный, недооценивая дренаж запасов при затяжке"
  что_должно_быть_неизвестно:
    - "длительность забастовки (ключевая развилка)"
    - "скорость, с которой низкие запасы транслируются в цену"
  сигналы_хорошего_рассуждения:
    - "НЕ входит на пике всплеска (тайминг: ret_z/vol_z аномальны → ВОВРЕМЯ только после отката/на подтверждении запасами)"
    - "различает разовый импульс и структурный дефицит — условие на длительность"
    - "вход лимитами частями, не по рынку в момент всплеска (§14)"

несовершенство_маскировки: |
  «Забастовка на крупном медном руднике → рост цены» — хрестоматийный класс; модель распознаёт
  механизм. Страна Y, металл M, числа нейтрализованы. Результат ориентировочный (§23.2).
