# config/rubric.yaml — ВЕРСИОНИРУЕМАЯ судейская рубрика состязательного контура (MASTER_SPEC §4 блок E, §5, §26)
# Судья СЛЕПОЙ (не знает, какая модель/агент что писал), порядок аргументов РАНДОМИЗИРОВАН,
# оценка — СТРОГО ПО ЭТОЙ РУБРИКЕ. Рубрика версионируется (как weights.yaml): менять состав/шкалу
# критериев — только с явного согласия пользователя; правка повышает version и пишется в git.
#
# Зафиксировано из ЧЕРНОВИКА Нед.7 (reports/prompts_review.md, отревьюен пользователем):
# 6 критериев, шкала 0–5, два обязательных вопроса, защита от «протекания» рубрики (§16.6).
# Балльная шкала — инженерный артефакт (§26 даёт обязательные ВОПРОСЫ, но не числовую шкалу),
# помечена как таковой; состав критериев меняется только с согласия пользователя.

version: "1.0"
created: "2026-06-11"
spec_ref: "§4 блок E (Судья), §5 (иерархия), §26, §16.6 (протекание рубрики)"
note: "Зафиксирована из отревьюенного черновика Нед.7. Менять состав/шкалу — только с согласия пользователя (CLAUDE.md «Стиль работы»)."

scale:
  min: 0
  max: 5
  anchors:
    0: "критерий полностью провален"
    1: "очень слабо"
    2: "слабо / спорно"
    3: "приемлемо: довод по существу есть"
    4: "сильно: подтверждено и устояло под критикой"
    5: "безупречно: проверяемо, независимо подтверждено, неоспоримо"

# 6 критериев судейской оценки (НЕ путать со скорингом отбора §7). Судья выставляет балл 0–5
# по каждому с ОДНОЙ строкой обоснования; средний балл против break_threshold → вердикт.
criteria:
  - id: causal_chain_strength
    title: "Сила каузальной цепочки"
    desc: "Механизм реален (из knowledge/causal_links), а не post-hoc; дальние порядки обоснованы"
  - id: source_quality_independence
    title: "Качество и независимость источников (анти-галлюцинации)"
    desc: "Каждый факт со ссылкой; источники независимы; пережил ли проверку reviewer данных"
  - id: timing_accounted
    title: "Учтён тайминг (РАНО/ВОВРЕМЯ/ПОЗДНО/ЛОВУШКА)"
    desc: "Окно входа открыто; ход не отыгран сверх порога σ; нет входа на ПОЗДНО/ЛОВУШКА без контр-сценария"
  - id: anti_manipulation_passed
    title: "Пройдена антиманипуляция"
    desc: "Манипуляционный балл ниже порога; учтён вопрос «кто продаёт нам»"
  - id: resolvability_p9
    title: "Разрешимость по §9"
    desc: "Однозначная формулировка ДО события: актив, направление, величина, срок, источник цены"
  - id: net_asymmetry
    title: "Асимметрия net-издержек"
    desc: "Матожидание после ВСЕХ издержек положительно; апсайд/даунсайд асимметричны в нашу пользу"

# Порог вердикта: средний балл рубрики ≥ break_threshold → УСТОЯЛА, иначе РАЗБИТА.
# 3.0/5 = «приемлемо по существу» в среднем (инженерный дефолт, помечен).
verdict:
  break_threshold: 3.0
  twice_broken_freeze_days: 14   # §6: дважды разбитая судьёй идея замораживается на N дней

# ОБЯЗАТЕЛЬНЫЕ вопросы судьи (§4 блок E, §5, §6) — без явного ответа на ОБА вердикт
# недействителен (процедурное вето §5.6).
mandatory_questions:
  - id: who_sells
    question: "Кто продаёт нам и почему он неправ?"
    if_unanswered: "сильный довод ПРОТИВ идеи"
  - id: why_exists
    question: "Почему возможность ещё существует / не отыграна?"
    if_unanswered: "идея отыграна → штраф"

# §16.6: рубрика и слепота со временем «протекают» (модели учатся писать под форму).
# Суди по СУЩЕСТВУ доказательств, а не по соответствию форме. Квартальный аудит судейских
# решений (§25) проверяет, не превратилась ли рубрика в чек-лист.
leakage_guard:
  spec_ref: "§16.6, §25 (квартальный ручной аудит 10 судейских решений)"
  rule: "балл — за проверяемые основания и выживание под критикой, не за красноречие/форму"

# Протокол слепого суда (реализация — orchestrator/debate.py):
blinding:
  strip_model_identity: true     # аргументы подаются без указания модели/семейства
  strip_role_labels: true        # и без ярлыка «генератор/критик/адвокат» — нейтральные метки A/B/C…
  randomize_argument_order: true # порядок рандомизирован (seed из run_id+актив — воспроизводимо)
  judge_family_distinct: true    # П10: семья судьи И ВСЕХ её фолбеков ≠ семья генератора текущей идеи (код)
