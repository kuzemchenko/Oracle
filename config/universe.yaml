# config/universe.yaml — торговый универсум и источники котировок (MASTER_SPEC §14, §30)
# Котировки тянет data/eodhd.py в storage/oracle.db (таблица quotes).
#
# ВАЖНО (решение Недели 1, не покрытое спецификацией):
#   Подписка EODHD на этом тарифе НЕ содержит фьючерсной/товарной биржи (.COMM) и спот-индексов
#   Brent/меди. Доступны: акции/ETF (.US и др.), индексы (.INDX), FOREX, виртуальные биржи.
#   Поэтому сырьевые активы ядра представлены ЛИКВИДНЫМИ ETF-прокси (они же — то, что реально
#   торгуется по §14: «ликвидные ETF на сырьё»). Канонический источник цены Brent для §9-разрешимости
#   тематических прогнозов — ОТКРЫТЫЙ ВОПРОС к пользователю (см. поле brent_canonical_source).
#   Все proxy помечены, чтобы тайминг/сверка учитывали roll/contango-дрейф vs спот.

quote_source: eodhd
history_from: "2015-01-01"        # ≥10 лет (gate Недели 1)

# --- Бенчмарк (§30 п.4): 60% SPY + 40% BCOM(прокси DBC) ---
benchmark:
  components:
    - {symbol: SPY.US,  weight: 0.60, role: equity}
    - {symbol: DBC.US,  weight: 0.40, role: commodity_proxy}  # торгуемый прокси BCOM
  bcom_index_ref: BCOM.INDX        # сам индекс BCOM (price) — доступен, тянем для честной сверки прокси
  bcom_tr_ref:    BCOMTR.INDX      # BCOM total return — тянем как референс

# --- Тематические активы (§30 п.5) ---
themes:
  brent:                           # тема №1 — ежедневная сверка
    proxy_etf: BNO.US              # United States Brent Oil Fund — торгуемый прокси Brent, 11 лет истории
    related: [USO.US]              # WTI-прокси для смежных каскадов
    brent_canonical_source: BNO.US        # РЕШЕНИЕ ПОЛЬЗОВАТЕЛЯ (Нед.4): источник цены Brent для §9-разрешимости
    brent_canonical_source_note: "ETF-прокси Brent; известные искажения — roll/contango, трекинг-ошибка; риск-агент и синтезатор отчёта ОБЯЗАНЫ указывать это в идеях по Brent"
    # Обоснование выбора (аудит Нед.4): тариф EODHD НЕ отдаёт фьючерс Brent ближайшей серии — биржа COMM = 404
    #   (не в подписке), символы BRN.COMM/BZ.COMM/BRN.ICE и пр. = 404; search 'brent' даёт только ETF.
    #   Фьючерса нет → канонический источник = ликвидный ETF-прокси BNO.US (11 лет истории). PENDING_USER ЗАКРЫТ.
    drift_warning: "ETF-прокси имеет roll/contango-дрейф vs спот Brent — учитывать в тайминге и сверке"
  copper:                          # тема №2 — со 2-го месяца
    proxy_etf: CPER.US             # United States Copper Index Fund — прокси цены меди
    related: [COPX.US, FCX.US, SCCO.US]  # медники (equity) для каскадов смежных областей
  ai_power:                        # ТЕКТОНИЧЕСКАЯ цепочка (пилот движка §5/П5)
    proxy_etf: VRT.US              # якорь с историей (узел 1: питание ЦОД) → гард пропускает
    cascade_chain: ai_power_transformers_metal   # knowledge/cascade_chains.yaml
    related: [GEV.US, ETN.US, CLF.US, NUE.US]    # узлы 2–4: трансформаторы → GOES-сталь → сырьё
    event: "Бум ИИ-датацентров → структурный спрос на энергию → дефицит трансформаторов → GOES-сталь сердечников"
    note: "Торгуемый edge — на дальних чокпоинт-узлах (CLF=GOES, GEV/ETN=трансформаторы), не у истока (VRT уже разогрет)"
  iran_transition:                 # ПОДПИСЬ ВЛАДЕЛЬЦА 05.07.2026 (§30, proposed_themes ef_20260705T090002Z)
    proxy_etf: USO.US              # шок темы проявляется в нефтяной риск-премии (ликвидный WTI-прокси)
    related: [BNO.US, XLE.US, FRO.US, STNG.US, INSW.US, LNG.US, GLD.US, ITA.US]  # танкеры/СПГ/защитные
    event: "Смерть Хаменеи 05.07.2026, транзит власти (сценарий владельца: консолидация КСИР); риск Ормуза"
    note: "ДВУСТОРОННЯЯ тема: эскалация → военная премия фрахта/нефти возвращается; прагматичная консолидация → нормализация продолжается. Маркеры: страхование Залива, трафик пролива, риторика КСИР"
  lng_normalization:               # ПОДПИСЬ ВЛАДЕЛЬЦА 05.07.2026 (§30, proposed_themes ef_20260705T090002Z)
    proxy_etf: UNG.US              # природный газ — прямой прокси риск-премии темы
    related: [LNG.US, FLNG.US, GLNG.US, CQP.US, CF.US]   # экспортёры/газовозы/энергоёмкие потребители
    event: "Нормализация СПГ-потоков после Ормузского сбоя: снятие газовых ограничений (Индия и др.), 05.07.2026"
    note: "Обратная ветка iran_transition: фрахт газовозов и премия газа сдуваются, маржа энергоёмких растёт"
  spacex:                          # СТРУКТУРНАЯ тема (событие-IPO, не калибровочная)
    proxy_etf: SPCX.US             # сам SpaceX — НЕКАЛИБРУЕМ (2 бара): только research, без seal §16
    structural: true               # режим структурной темы: якорим каскад, торгуемый выход — на звенья
    related: [RKLB.US, ASTS.US]    # спутниковые аналоги (переоценка по «компу» Starlink) — КАЛИБРУЕМЫ
    event: "IPO SpaceX 11.06.2026, ~$1.77 трлн, 7-я компания США; Fast Entry в Nasdaq-100 (~+15 торг.дней); лок-ап 180д ступенчатый"
    note: "Торгуемые/вероятностные выводы — на related (RKLB/ASTS/QQQ-эффект), по SPCX — карта каскада + лист ожидания (§17.2, П16)"

# --- Активы ядра, котировки которых тянем с Недели 1 ---
core_symbols:
  - SPY.US        # бенчмарк equity
  - DBC.US        # бенчмарк commodity (прокси BCOM)
  - BCOM.INDX     # индекс BCOM (референс)
  - BCOMTR.INDX   # BCOM total return (референс бенчмарка)
  - BNO.US        # Brent (прокси) — тема №1
  - USO.US        # WTI (прокси) — смежное
  - CPER.US       # медь (прокси) — тема №2
  - COPX.US       # медники (equity) — смежное
  - SPCX.US       # SpaceX — структурная тема (research, некалибруем)
  - RKLB.US       # Rocket Lab — каскадное звено SpaceX (калибруемо)
  - ASTS.US       # AST SpaceMobile — каскадное звено SpaceX (калибруемо)
  - VRT.US        # Vertiv — питание/охлаждение ЦОД (узел 1 цепочки ai_power)
  - GEV.US        # GE Vernova — сети/трансформаторы (узел 2, чокпоинт)
  - ETN.US        # Eaton — электрооборудование (узел 2)
  - CLF.US        # Cleveland-Cliffs — GOES-сталь сердечников (узел 3, чокпоинт)
  - NUE.US        # Nucor — сталь/сырьё (узел 4)

liquidity_filter:                  # §14: наш объём незаметен в стакане; тонкие рынки запрещены
  min_avg_daily_volume: 100000     # стартовый порог; уточняется при скоринге контролируемости риска
nft_excluded: true                 # §14: NFT исключены
