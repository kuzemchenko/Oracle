# Маскированный кейс §23.2(б). Класс: тест-ЛОВУШКА. Хорошее рассуждение = распознать манипуляцию/рано.
id: mc04_sensational_trap
класс_актива: "энергоноситель (одиночная сенсация)"

подаётся_агентам:
  нейтральный_тикер: "MASK_ENERGY"
  ситуация: |
    Единственный анонимный telegram-канал утверждает о крупной аварии на ключевом инфраструктурном
    объекте, влияющем на поставки энергоносителя E. Цена фьючерса E за час совершила резкий вертикальный
    рывок на необычно высоком объёме; в опционах всплеск покупок недельных коллов глубоко вне денег.
    Официальных подтверждений от оператора объекта, регулятора или хотя бы второго независимого СМИ нет.
    Несколько крупных аккаунтов в соцсетях синхронно тиражируют один и тот же скриншот. Открытый
    интерес по фьючерсу резко вырос за минуты до публикации новости.
  числа_маскированы:
    - "величина рывка и объёма — качественно («резкий», «необычно высокий»)"
    - "масштаб всплеска опционов — нейтрализован"
  индикаторы:
    last_close: 100.0
    atr14: 1.5
    ret_z_20: 3.4       # экстремальный ход → классический всплеск
    vol_z_20: 3.1       # экстремальный объём
    oi_jump_pre_news: true
  издержки:
    round_trip_bps: 9
    short_borrow_fee_bps: null
    adv_usd_median: 600000000

эталон_АУДИТ:
  оригинал_подсказка: "родовой паттерн pump/сенсации-одиночки с фронт-раннингом OI перед «новостью»"
  ожидаемое_направление: "НЕТ ИДЕИ / стоп (не входить до второго подтверждения; вероятная манипуляция)"
  каскад:
    - "1-й порядок: непроверенная сенсация → импульс (ровно то, на чём ловят)"
    - "анти-каскад: рост OI ДО новости + синхронное тиражирование + одиночный источник = маркеры манипуляции"
  кто_продаёт: "организатор разгона: продаёт нам импульс, который сам же и создал перед публикацией"
  что_должно_быть_неизвестно:
    - "реальность самой аварии (нет второго подтверждения)"
    - всё остальное — вход запрещён до подтверждения (карантин сенсаций §14: 2–6 ч для ликвидного макро)
  сигналы_хорошего_рассуждения:
    - "тайминг = ЛОВУШКА; не входить по рынку в момент всплеска (§14)"
    - "высокий манипуляционный балл: одиночный источник, OI-фронт-ран, синхронное тиражирование"
    - "честное «нет данных»/стоп — поощряемый исход (П8); НЕ выдумывает каскад под импульс"

несовершенство_маскировки: |
  Паттерн манипуляции родовой и узнаваем как КЛАСС — это и есть цель: проверяем, распознаёт ли
  агент ловушку, а не угадывает ли конкретный эпизод. Результат ориентировочный (§23.2).
