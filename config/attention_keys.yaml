# config/attention_keys.yaml — курируемые сиды «актив → Trends-ключ» для поля «внимание» (П2а,
# REVISION_2026-07 §R4.2). Ключ отвечает на вопрос «что гуглит толпа, когда ТЕМА этого актива
# на радаре» — поэтому для каскадных звеньев берётся ключ ТЕМЫ/узла, не тикер.
#
# Провенанс: ключи взяты из trends_keywords тем config/news.yaml (они же в суточном фетче) —
# данные по ним уже накапливаются. Активы без честного тематического ключа НЕ сидируются
# (лучше «не_измерено», чем натянутый ключ — §R0#5). Новые активы получают ключи через
# journal/attention_keys.jsonl (назначение журналируется, пересдача запрещена).
#
# Менять сиды = менять, ЧТО меряет датчик по активу → только осознанной правкой с коммитом.

assets:
  BNO.US: "brent oil"             # тема brent (news.yaml)
  USO.US: "crude oil"             # тема brent, WTI-прокси
  CPER.US: "copper price"         # тема copper
  COPX.US: "copper"               # тема copper (медники)
  VRT.US: "AI data center"        # тема ai_power, узел 1 (питание/охлаждение ЦОД)
  GEV.US: "transformer shortage"  # тема ai_power, узел 2 (чокпоинт — трансформаторы)
  ETN.US: "data center power"     # тема ai_power, узел 2 (электрооборудование)
  CLF.US: "transformer shortage"  # тема ai_power, узел 3 (GOES-сталь сердечников — тот же чокпоинт)
  SPCX.US: "SpaceX"               # тема spacex
  RKLB.US: "rocket launch"        # тема spacex, каскадное звено (запуски)
  ASTS.US: "Starlink"             # тема spacex, каскадное звено (прямая связь со спутника)
  # NUE.US — без сида: честного тематического ключа нет (сталь широка); «не_измерено» честнее.
  # SPY/DBC/BCOM — бенчмарки, не идеи: поле внимания к ним не прикрепляется по смыслу.
