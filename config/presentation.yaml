# config/presentation.yaml — СЛОЙ ПОДАЧИ отчёта §8 в Telegram (только отображение).
# НЕ влияет на данные/журналы/честность (CLAUDE.md): journal/funnel_logs и predictions.jsonl
# пишутся полностью независимо. Здесь — только то, КАК текст показывается человеку.
# Правится руками ИЛИ командой бота /format (см. ops/bot.py).

version: 1

# Режим многословности карточки идеи:
#   long  — ℹ️-пояснения показаны у ВСЕХ 13 полей (по умолчанию, пока пользователь привыкает);
#   short — ℹ️ показаны ТОЛЬКО для полей из still_unclear; содержание (→) остаётся всегда.
mode: long

# В режиме short — номера полей §8 (1..13), у которых всё ещё показывать ℹ️ («ещё мутно»).
still_unclear: []

# Слать ли проверочные (mock/test) прогоны в Telegram. По умолчанию НЕТ — чтобы не путать с
# идеями. Если true — приходят с явной шапкой «🔧 Проверка связи — это НЕ идея».
send_mock_to_telegram: false
