# Маскированный кейс §23.2(б). Класс: тест дисциплины. Хорошее рассуждение = не гнаться за отыгранным.
id: mc06_safehaven_overreaction
класс_актива: "защитный актив (после движения)"

подаётся_агентам:
  нейтральный_тикер: "MASK_HAVEN"
  ситуация: |
    На фоне обострения геополитической напряжённости в регионе G защитный актив H за две недели
    совершил сильный, широко освещённый рост и обновил многолетний максимум; деловые СМИ выпустили
    серию материалов «почему H будет только дорожать». Позиционирование спекулянтов по отчёту
    биржи — вблизи исторических экстремумов длинных позиций. Сама напряжённость пока не привела к
    реализованным перебоям физических потоков или поставок. Котировка H держится у максимума,
    но импульс роста за последние сессии затухает; объём на росте снижается (дивергенция).
  числа_маскированы:
    - "величина роста H и уровень максимума — качественно"
    - "степень экстремума позиционирования — «вблизи исторических»"
  индикаторы:
    last_close: 100.0
    atr14: 1.9
    ret_z_20: 2.6        # движение уже большое и широко отыграно
    vol_z_20: -0.7       # объём на росте падает → угасание импульса
  издержки:
    round_trip_bps: 7
    short_borrow_fee_bps: 20
    adv_usd_median: 900000000

эталон_АУДИТ:
  оригинал_подсказка: "родовой эпизод перекупленного защитного актива на хайпе после большого хода"
  ожидаемое_направление: "НЕ лонг (поздно); максимум — осторожный контр-тезис/стоп; лонг на хайпе — ошибка тайминга"
  каскад:
    - "1-й порядок: геополитика → импульсный рост H (уже совершён и широко освещён)"
    - "ключ: отыгранность. Нет реализованного перебоя потоков — драйвер пока нарративный, не балансовый"
  кто_продаёт: "поздние покупатели на хайпе СМИ при экстремальном длинном позиционировании — толпа на одной стороне"
  что_должно_быть_неизвестно:
    - "перерастёт ли напряжённость в реальные перебои потоков (тогда тезис менялся бы)"
  сигналы_хорошего_рассуждения:
    - "тайминг = ПОЗДНО: ход отыгран (ret_z высок), импульс угасает (дивергенция объёма)"
    - "распознаёт экстремум позиционирования и нарративную природу драйвера"
    - "честно отказывается гнаться за движением; лонг здесь — ловушка толпы (П8: «нет идеи» допустимо)"

несовершенство_маскировки: |
  Паттерн «перекупленный safe-haven на хайпе» родовой; модель опознаёт КЛАСС дисциплины тайминга.
  Регион G, актив H, числа нейтрализованы. Результат ориентировочный (§23.2).
