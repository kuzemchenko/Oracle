# Маскированный кейс §23.2(б). Класс: энергия. Каскад «остановка НПЗ→дефицит продукта→крек-спред».
id: mc05_refinery_crackspread
класс_актива: "нефтепродукты (крек-спред)"

подаётся_агентам:
  нейтральный_тикер: "MASK_PRODUCT"
  ситуация: |
    В регионе R внеплановая остановка нескольких крупных нефтеперерабатывающих заводов совпала с
    началом сезонного пика спроса на топливо T. Запасы готового продукта T в регионе снижаются
    четыре недели подряд и ушли ниже пятилетнего диапазона. При этом цена сырой нефти — сырья для
    T — стоит на месте: рынок сырья изолированно сбалансирован. Спред «продукт минус сырьё»
    (маржа переработки) начал расширяться, но участники форумов спорят, разовый ли это всплеск.
    Логистика поставок продукта из соседних регионов ограничена пропускной способностью терминалов.
  числа_маскированы:
    - "число и мощность остановленных НПЗ — нейтрализованы"
    - "глубина падения запасов — «ниже пятилетнего диапазона»"
    - "уровень спреда — качественно"
  индикаторы:
    last_close: 100.0     # котировка крек-спреда (в пунктах маржи)
    atr14: 2.6
    ret_z_20: 0.9         # спред только начал расширяться → окно скорее открыто
    vol_z_20: 0.8
  издержки:
    round_trip_bps: 14    # спред = две ноги, издержки выше
    short_borrow_fee_bps: null
    adv_usd_median: 120000000

эталон_АУДИТ:
  оригинал_подсказка: "родовой эпизод остановки НПЗ в пик спроса → расширение крек-спреда (не плоский лонг нефти)"
  ожидаемое_направление: "лонг крек-спреда (маржи переработки), НЕ лонг сырой нефти"
  каскад:
    - "1-й порядок: остановка НПЗ → выпадение мощностей переработки"
    - "2-й порядок: дефицит готового продукта T в пик спроса при ограниченной логистике замещения"
    - "торгуемое звено: расширение спреда продукт−сырьё (маржа), т.к. сырьё сбалансировано отдельно"
  кто_продаёт: "те, кто торгует нефть целиком и игнорирует РАСЩЕПЛЕНИЕ маржи между сырьём и продуктом"
  что_должно_быть_неизвестно:
    - "срок восстановления остановленных мощностей"
    - "скорость переброски продукта из соседних регионов"
  сигналы_хорошего_рассуждения:
    - "торгует именно СПРЕД, а не сырьё — точная локализация торгуемого звена"
    - "учитывает удвоенные издержки двух ног (net-асимметрия)"
    - "разрешимость §9: уровень спреда к дате, источники цен обеих ног"

несовершенство_маскировки: |
  «Остановка НПЗ в пик спроса → крек-спред» — известный класс; модель опознаёт механизм. Регион R,
  продукт T, числа нейтрализованы. Результат ориентировочный (§23.2).
