# knowledge/cascade_chains.yaml — ТЕКТОНИЧЕСКИЕ КАСКАДНЫЕ ЦЕПОЧКИ (пилот движка §5/П5)
#
# Домен-знание (НЕ генерируется calibrate_week4 — это карта каскадов, авторская гипотеза).
# Каждая цепочка: триггер-событие → узлы 1–4 порядка с ТОРГУЕМЫМИ инструментами, флагом
# «чокпоинт» (бутылочное горло: мало субститутов → амплитуда переноса и ценовая власть) и
# рёбрами с ЛАГАМИ. Лаги/силы — гипотезы, подтверждаются ТОЛЬКО форвардом (П16); эмпирическая
# калибровка лагов — задача §23.1 на товарных рядах.
#
# Назначение: даёт агентам каскадов карту для обхода 2–4 порядка, а mathlib/tectonic.py —
# структуру для оценки тектонического потенциала и выбора наименее отыгранного дальнего узла.

version: 1
spec_ref: §5 каскады 2–4 порядка; П5 неочевидность; §23.1 лаги (форвард-валидация П16)
honesty_note: лаги и силы рёбер — доменные гипотезы (не измерены), подтверждаются форвардом

chains:
  - id: ai_power_transformers_metal
    title: "ИИ-датацентры → энергия → трансформаторы → металл сердечников"
    trigger:
      event: "Структурный рост спроса на электроэнергию от бума ИИ-датацентров"
      magnitude: high          # нацмасштабный капекс на генерацию/сети на годы
      persistence: structural  # режимный сдвиг (кварталы–годы), не разовый репрайс
      surprise: medium         # консенсус про ИИ есть; масштаб энергодефицита — недооценён
    nodes:
      - order: 1
        node: "Питание и охлаждение ЦОД (датацентровая инфраструктура)"
        instruments: [VRT.US]              # Vertiv — питание/охлаждение ЦОД
        chokepoint: false
        priced_hint: high                  # ИИ-инфра уже разогрета рынком
      - order: 2
        node: "Сетевое и трансформаторное оборудование (дефицит трансформаторов, длинные сроки)"
        instruments: [GEV.US, ETN.US]      # GE Vernova (сети/генерация), Eaton (электрооборуд.)
        chokepoint: true                   # узкое горло: глобальный дефицит трансформаторов
        priced_hint: medium
      - order: 3
        node: "Текстурированная электротехническая сталь (GOES) — металл сердечников трансформаторов"
        instruments: [CLF.US]              # Cleveland-Cliffs — производитель GOES в США
        chokepoint: true                   # мало производителей GOES, незаменимый вход
        priced_hint: low                   # дальнее звено, обычно НЕ отыграно
      - order: 4
        node: "Сталь/сырьё и медь обмоток"
        instruments: [NUE.US, COPX.US, FCX.US]
        chokepoint: false
        priced_hint: low
    edges:                                  # для центральности и окна входа (сумма лагов)
      - {from: 1, to: 2, lag_days: 30, strength: hypothesis}
      - {from: 2, to: 3, lag_days: 60, strength: hypothesis}
      - {from: 3, to: 4, lag_days: 90, strength: hypothesis}
    invalidation:
      - "Спад/пауза капекса ЦОД (замедление ИИ-стройки) обрывает спрос у истока"
      - "Субституты сердечников (аморфные сплавы) или рост импорта GOES снимают дефицит — узкое горло исчезает"
      - "Вертикальная интеграция OEM (свой выпуск стали) обходит независимых производителей GOES"
