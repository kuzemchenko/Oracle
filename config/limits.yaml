# config/limits.yaml — ПРЕ-КОММИТМЕНТ риск-лимитов и бюджетов (MASTER_SPEC §11, §12, §30, П12)
# ЛИМИТЫ ЗАШИТЫ В КОДЕ: оркестратор проверяет их ПРОГРАММНО перед каждым прогоном/идеей.
# Система ОТКАЗЫВАЕТСЯ обсуждать превышение в моменте (§12). Поднять потолок может ТОЛЬКО
# пользователь явным решением — это его прерогатива (П12), не предмет уговоров агентов.

version: 1
updated: "2026-06-11"

capital_anchor_usd: 100000        # §30 п.3 капитал-ориентир

# --- Риск-лимиты позиций (§30 п.3, зашиты против «человеческого фактора» §16.4) ---
risk:
  per_idea_microsize_pct: 0.5     # этап Д: 0.5% = $500/идея (Келли — ТОЛЬКО после gate калибровки)
  per_idea_microsize_usd: 500
  monthly_risk_cap_pct: 3.0       # пре-коммитмент: 3% = $3000/мес
  monthly_risk_cap_usd: 3000
  fast_basket_pct: 10             # «быстрые» идеи = 10% месячного риск-бюджета, НЕПОПОЛНЯЕМАЯ
  fast_basket_usd: 300
  slow_ideas_min_pause_hours: 24  # «медленные» каскадные идеи — пауза ≥ суток до решения (§12)
  max_drawdown_stop: true         # превышение общего лимита просадки → стоп всей системы до разбора (§4 портфель)
  auto_paper_after_n_losses: 3    # после 3 убыточных принятых идей подряд → режим «только бумага» на 2 недели (§12)
  auto_paper_weeks: 2

# --- Бюджет владения (§30 п.2; жёсткий потолок) ---
# OpenRouter: реальный потолок — spending limit НА ВЫДЕЛЕННОМ КЛЮЧЕ "oracle" ($500/мес).
# Этот файл — второй независимый контур: проверка перед прогоном, работает даже если лимит ключа изменят.
budget:
  tokens_usd_month: 500           # ~$500 токены OpenRouter
  data_usd_month: 200             # ~$200 данные (NewsAPI.ai ~$90 + EODHD ~$100)
  total_usd_month: 700            # жёсткий потолок суммарно (этап Бумаги)
  alert_fraction: 0.8             # ≥80% → ВНИМАНИЕ; ≥100% → прогоны стоп
  review_after_month: 1           # пересмотр после 1-го месяца по метрике «стоимость инсайта»
  costs_log: journal/costs.jsonl  # каждый вызов OpenRouter обязан писать строку (ts, mode, agent, model, cost)

# --- Бюджет токенов на ШАГ сборки (§24; превышение = стоп и разбор) ---
# Полный контур дороже поэтапного ×2–3 на прогон — заложено заранее.
per_run_token_budget_usd:
  funnel_full: 8.0                # боевой прогон полной воронки (этапы 1–6)
  theme_daily: 1.5                # тематический режим (1 актив/день)
  calibrate: 2.0                  # калибровочный режим (10–20 мелких прогнозов)
  masked_smoke: 6.0               # регрессия маскированных кейсов §23.2б: 13 кейсов × 5 ролей = 65
                                  # вызовов (расширено с 6 кейсов в Нед.8; ×средняя цена ≈$0.07 → ~$5
                                  # с запасом). Месячный потолок $700 — неизменный жёсткий потолок.

# --- Вход для ПРЕД-проверки бюджета прогона (§24, долг Нед.8) ---
# Оценка стоимости прогона ДО первого LLM-вызова = ожидаемое_число_вызовов × средняя_цена_вызова.
# Среднюю цену берём из истории journal/costs.jsonl (успешные live-вызовы за месяц); пока истории
# нет — консервативный приор ниже. Оценка > потолка per_run_token_budget_usd[mode] → ОТКАЗ (§24),
# никаких вызовов не делается. Числа вызовов — инженерная оценка контура (НЕ лимит, не §-канон).
per_run_expected_calls:
  funnel_full: 70                 # ~21 поле + D на срезах + 5×дебаты(5) + риск/синтез
  theme_daily: 20
  calibrate: 20
  masked_smoke: 5                 # на ОДИН кейс (5 ролей контура E); ×N кейсов считается динамически
cost_per_call_prior_usd: 0.04     # приор средней цены вызова, пока нет истории (консервативно)

# --- Денежные ворота §11 (НЕ редактируются — защита от самообмана) ---
gates:
  paper_to_money_predictions: 270 # Gate Б→Д: 270+ разрешённых прогнозов ИЛИ письменная подпись пользователя
  calibration_band_pp: 10         # калибровка должна быть в пределах ±10 п.п.
  kill_calibration_band_pp: 15    # KILL-критерий: калибровка хуже ±15 п.п.
  kill_no_edge_after_predictions: 270  # после 270 прогнозов нет значимого превышения над бенчмарком → KILL
  benchmark: "0.6*SPY + 0.4*BCOM(DBC)"  # §30 п.4

# --- Holdout (§10.3) ---
holdout:
  access_budget_per_year: 4
  log: journal/holdout_access.log
