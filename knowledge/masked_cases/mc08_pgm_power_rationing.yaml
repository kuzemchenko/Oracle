# Маскированный кейс §23.2(б). Класс: драгоценный пром. металл (PGM). Каскад «энергодефицит у производителя→срез добычи→цена».
id: mc08_pgm_power_rationing
класс_актива: "драгоценный промышленный металл (платиновая группа)"

подаётся_агентам:
  нейтральный_тикер: "MASK_PGM"
  ситуация: |
    Страна Z обеспечивает доминирующую долю мировой первичной добычи металла платиновой группы P.
    Национальный энергооператор Z ввёл веерные ограничения электроснабжения промышленности из-за
    структурного дефицита генерации; глубокие шахты P энергоёмки и вынуждены снижать загрузку.
    Несколько производителей официально предупредили о сокращении годового плана выпуска. Биржевые
    запасы P умеренные, но вторичное предложение (переработка лома) неэластично в коротком окне.
    Спотовая цена P отреагировала слабо: рынок исторически скептичен к «обещаниям срезов». Кривая
    фьючерсов плоская.
  числа_маскированы:
    - "СКРЫТЫ идентичности: страна Z, металл P, производители, год"
    - "величины — НЕЙТРАЛЬНЫЕ синтетические ориентиры ниже; направление НЕ дано — выводит контур"
  нейтральные_количественные_ориентиры:
    доля_страны_в_первичной_добыче_P: "≈70%"
    масштаб_веерных_ограничений: "до ≈10–15% потерь рабочего времени энергоёмких шахт"
    заявленное_сокращение_годового_плана: "−5–8% совокупно (предупреждения производителей)"
    эластичность_вторичного_предложения: "низкая в окне 1–2 кварталов"
    типичный_лаг_энергодефицит_к_балансу: "1–2 квартала (библиотека предвестников)"
    историч_диапазон_реакции_класса: "15–35% при подтверждённом устойчивом срезе за 1–2 кв."
    отыграно_к_текущему_моменту: "спот ≈+1–2% (рынок скептичен к обещаниям)"
  источники_среза:
    - источник: "приказ нац. энергооператора Z (офиц.)"
      факт: "веерные ограничения промышленности из-за дефицита генерации"
      независимость: "первичный официальный"
    - источник: "производственные апдейты эмитентов-производителей P"
      факт: "предупреждения о сокращении годового плана на 5–8%"
      независимость: "первичная отчётность (заинтересованная сторона — учитывать)"
    - источник: "биржевые складские данные + сводка вторичного предложения (агентство)"
      факт: "запасы умеренные; переработка лома неэластична в коротком окне"
      независимость: "биржевой + независимое агентство"
  индикаторы:
    last_close: 100.0
    atr14: 2.3
    ret_z_20: 0.5        # реакция слабая → окно открыто, но нужно подтверждение срезов
    vol_z_20: 0.4
  издержки:
    round_trip_bps: 13
    short_borrow_fee_bps: 40
    adv_usd_median: 180000000

эталон_АУДИТ:
  expected_stance: "affirm"   # реальный каскад срезa первичного предложения; audit-only
  оригинал_подсказка: "родовой эпизод энергодефицита у доминирующего производителя PGM"
  ожидаемое_направление: "лонг металла P (осторожно — нужен переход обещаний в факт срезов)"
  каскад:
    - "1-й порядок: новость об ограничениях (слабо отыграна — рынок скептичен)"
    - "2-й порядок: переход предупреждений в фактическое сокращение выпуска через лаг"
    - "торгуемое звено: рост фьючерса P по мере подтверждения дефицита первичного предложения"
  кто_продаёт: "те, кто помнит несбывшиеся «обещания срезов» и торгует спот без переноса на годовой баланс"
  что_должно_быть_неизвестно:
    - "сбудутся ли заявленные срезы и их глубина"
    - "скорость восстановления генерации в Z"
  сигналы_хорошего_рассуждения:
    - "различает ОБЕЩАНИЕ среза и ФАКТ; не покупает на одной риторике, ждёт подтверждения/строит условие"
    - "учитывает скептицизм рынка как причину незакрытого окна (почему ещё существует)"
    - "разрешимость §9: уровень P к дате через 1–2 кв., источник — биржевая котировка"

несовершенство_маскировки: |
  Связка «энергодефицит у доминирующего производителя → рост PGM» родовая: модель распознаёт КЛАСС,
  но не конкретный эпизод — страна/металл/год скрыты. Результат ориентировочный (§23.2).
